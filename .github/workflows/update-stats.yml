name: Update GitHub Stats
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Get GitHub Stats
        env:
          GIST_ID: ${{ vars.GIST_ID }}
          TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          curl -s -H "Authorization: token $TOKEN" \
            "https://api.github.com/user/repos?per_page=100&type=owner&affiliation=owner" > repos.json

          TOTAL=$(jq 'length' repos.json)
          LANGUAGES=$(jq -r '.[].language' repos.json \
            | grep -v null \
            | sort | uniq -c | sort -rn | head -10 \
            | sed 's/^[[:space:]]*//' \
            | awk '{print "- " $2 ": " $1 " repos"}')

          UPDATED=$(date -u '+%Y-%m-%d %H:%M UTC')

          CONTENT=$(printf "# My GitHub Stats\n\nTotal Repositories: %s\n\nTop Languages:\n%s\n\n*Last updated: %s*" "$TOTAL" "$LANGUAGES" "$UPDATED")

          ESCAPED=$(printf '%s' "$CONTENT" | jq -Rs .)
          curl -s -X PATCH \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d "{\"files\":{\"github-stats.md\":{\"content\":$ESCAPED}}}" \
            "https://api.github.com/gists/$GIST_ID" | jq .

          echo "Gist updated!"
