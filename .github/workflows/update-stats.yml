name: Update GitHub Stats

on:
  schedule:
    - cron: "0 2 * * *"  # Daily at 2 AM UTC
  workflow_dispatch:     # Manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Get GitHub Stats
        env:
          GIST_ID: ${{ vars.GIST_ID }}
          TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          curl -s -H "Authorization: token $TOKEN" \
            https://api.github.com/user/repos?per_page=100 > repos.json
          
          TOTAL=$(jq 'length' repos.json)
          
          # Count languages
          LANGUAGES=$(jq -r '.[].language' repos.json | grep -v null | sort | uniq -c | sort -rn | head -10 | awk '{print "- " $2 ": " $1 " repos"}' | tr '\n' '|' | sed 's/|/\n/g')
          
          # Create content
          CONTENT="# My GitHub Stats\n\n📊 **Total Repositories:** $TOTAL\n\n**Top Languages:**\n$LANGUAGES"
          
          # Update gist
          curl -X PATCH \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -d "{\"files\":{\"github-stats.md\":{\"content\":\"$CONTENT\"}}}" \
            https://api.github.com/gists/$GIST_ID
